<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseCore - Registro</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<div class="contenedor-login">
    <div class="caja-login">
        <h1>🩸 PulseCore</h1>
        <p class="subtitulo">Crear una cuenta nueva</p>

        <div id="error-registro" class="mensaje-error oculto"></div>

        <div class="grupo-campo">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>
        <div class="grupo-campo">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="correo@ejemplo.com">
        </div>
        <div class="grupo-campo">
            <label for="telefono">Teléfono (opcional)</label>
            <input type="text" id="telefono" placeholder="3001234567">
        </div>
        <div class="grupo-campo">
            <label for="ciudad">Ciudad (opcional)</label>
            <input type="text" id="ciudad" placeholder="Medellín">
        </div>
        <div class="grupo-campo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        </div>

        <button class="btn btn-primario" style="width:100%; margin-top:8px" onclick="registrar()">
            Crear cuenta
        </button>

        <p style="text-align:center; margin-top:14px; font-size:0.85rem; color:#888">
            ¿Ya tienes cuenta?
            <a href="login.html" style="color: var(--rojo)">Inicia sesión</a>
        </p>
    </div>
</div>

<script>
    async function registrar() {
        const nombre   = document.getElementById('nombre').value.trim();
        const email    = document.getElementById('email').value.trim();
        const telefono = document.getElementById('telefono').value.trim();
        const ciudad   = document.getElementById('ciudad').value.trim();
        const password = document.getElementById('password').value;

        if (!nombre || !email || !password) {
            mostrarError('Nombre, email y contraseña son obligatorios');
            return;
        }

        if (password.length < 6) {
            mostrarError('La contraseña debe tener al menos 6 caracteres');
            return;
        }

        try {
            const respuesta = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre_completo: nombre, email, password, telefono, ciudad }),
            });

            const datos = await respuesta.json();

            if (!respuesta.ok) {
                mostrarError(datos.error || 'Error al registrar');
                return;
            }

            // Éxito: redirigir al login con mensaje
            alert('Cuenta creada correctamente. Ya puedes iniciar sesión.');
            window.location.href = 'login.html';

        } catch (err) {
            mostrarError('No se pudo conectar con el servidor');
        }
    }

    function mostrarError(mensaje) {
        const div = document.getElementById('error-registro');
        div.textContent = mensaje;
        div.classList.remove('oculto');
    }
</script>

</body>
</html>
