<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseCore - Iniciar sesión</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

<div class="contenedor-login">
    <div class="caja-login">
        <h1>🩸 PulseCore</h1>
        <p class="subtitulo">Plataforma de gestión de donantes</p>

        <!-- Mensaje de error (oculto por defecto) -->
        <div id="error-login" class="mensaje-error oculto"></div>

        <div id="formulario-login">
            <div class="grupo-campo">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="correo@ejemplo.com" autocomplete="email">
            </div>
            <div class="grupo-campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button class="btn btn-primario" style="width:100%" onclick="iniciarSesion()">
                Ingresar
            </button>
        </div>

        <p style="text-align:center; margin-top:16px; font-size:0.85rem; color:#888">
            ¿No tienes cuenta?
            <a href="register.html" style="color: var(--rojo)">Regístrate</a>
        </p>
    </div>
</div>

<script>
    // Si ya hay sesión activa, redirigir al dashboard
    if (localStorage.getItem('pc_token')) {
        window.location.href = 'dashboard.html';
    }

    /**
     * Llama a POST /api/login con el email y contraseña del formulario.
     * Si es exitoso, guarda el token y redirige al dashboard.
     */
    async function iniciarSesion() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-login');

        errorDiv.classList.add('oculto');

        if (!email || !password) {
            mostrarError('Por favor completa todos los campos');
            return;
        }

        try {
            const respuesta = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });

            const datos = await respuesta.json();

            if (!respuesta.ok) {
                mostrarError(datos.error || 'Error al iniciar sesión');
                return;
            }

            // Guardar token y datos del usuario en localStorage
            localStorage.setItem('pc_token', datos.token);
            localStorage.setItem('pc_usuario', JSON.stringify(datos.usuario));

            window.location.href = 'dashboard.html';

        } catch (err) {
            mostrarError('No se pudo conectar con el servidor');
        }
    }

    function mostrarError(mensaje) {
        const div = document.getElementById('error-login');
        div.textContent = mensaje;
        div.classList.remove('oculto');
    }

    // Permitir iniciar sesión con Enter
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') iniciarSesion();
    });
</script>

</body>
</html>
